    bit_offset: 4
    bit_size: 1
    enum: CPU_INT_RIS_TX
  - name: TXEMPTY
    description: Transmit FIFO Empty interrupt mask. This interrupt is set if all data in the Transmit FIFO have been move to the shift register.
    bit_offset: 5
    bit_size: 1
    enum: CPU_INT_RIS_TXEMPTY
  - name: IDLE
    description: SPI has done finished transfers and changed into IDLE mode. This bit is set when BUSY goes low.
    bit_offset: 6
    bit_size: 1
    enum: CPU_INT_RIS_IDLE
  - name: DMA_DONE_RX
    description: DMA Done 1 event for RX. This interrupt is set if the RX DMA channel sends the DONE signal. This allows the handling of the DMA event inside the mapped peripheral.
    bit_offset: 7
    bit_size: 1
    enum: CPU_INT_RIS_DMA_DONE_RX
  - name: DMA_DONE_TX
    description: DMA Done 1 event for TX. This interrupt is set if the TX DMA channel sends the DONE signal. This allows the handling of the DMA event inside the mapped peripheral.
    bit_offset: 8
    bit_size: 1
    enum: CPU_INT_RIS_DMA_DONE_TX
