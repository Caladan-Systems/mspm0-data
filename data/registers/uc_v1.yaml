block/GPRCM:
  items:
  - name: PWREN
    description: Power enable.
    byte_offset: 0
    fieldset: PWREN
  - name: RSTCTL
    description: Reset Control.
    byte_offset: 4
    access: Write
    fieldset: RSTCTL
  - name: CLKCFG
    description: Peripheral Clock Configuration Register.
    byte_offset: 8
    fieldset: CLKCFG
  - name: GPRCM_STAT
    description: Status Register.
    byte_offset: 20
    access: Read
    fieldset: GPRCM_STAT
block/UC:
  description: PERIPHERALREGION.
  items:
  - name: GPRCM
    array:
      len: 1
      stride: 24
    byte_offset: 2048
    block: GPRCM
  - name: IPMODE
    description: Mode Selection Register.
    byte_offset: 4352
    fieldset: IPMODE
fieldset/CLKCFG:
  description: Peripheral Clock Configuration Register.
  fields:
  - name: BLOCKASYNC
    description: Async Clock Request is blocked from starting SYSOSC or forcing bus clock to 32MHz.
    bit_offset: 8
    bit_size: 1
fieldset/GPRCM_STAT:
  description: Status Register.
  fields:
  - name: RESETSTKY
    description: This bit indicates, if the peripheral was reset, since this bit was cleared by RESETSTKYCLR in the RSTCTL register.
    bit_offset: 16
    bit_size: 1
fieldset/IPMODE:
  description: Mode Selection Register.
  fields:
  - name: SELECT
    description: Free run control.
    bit_offset: 0
    bit_size: 2
    enum: SELECT
fieldset/PWREN:
  description: Power enable.
  fields:
  - name: ENABLE
    description: Enable the power.
    bit_offset: 0
    bit_size: 1
  - name: KEY
    description: Write 0x26 to this.
    bit_offset: 24
    bit_size: 8
fieldset/RSTCTL:
  description: Reset Control.
  fields:
  - name: RESETASSERT
    description: Assert reset to the peripheral.
    bit_offset: 0
    bit_size: 1
  - name: RESETSTKYCLR
    description: Clear the RESETSTKY bit in the STAT register.
    bit_offset: 1
    bit_size: 1
  - name: KEY
    description: Write 0xB1 to this.
    bit_offset: 24
    bit_size: 8
enum/SELECT:
  bit_size: 2
  variants:
  - name: UART
    description: Default functionality is UART.
    value: 0
  - name: SPI
    description: SPG in SPI Mode.
    value: 1
  - name: I2C_CONTROLLER
    description: SPG in I2C Controller Mode.
    value: 2
  - name: I2C_PERIPHERAL
    description: SPG in I2C Peripheral Mode.
    value: 3
