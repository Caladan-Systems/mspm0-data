fieldset/CPU_INT_RIS:
  description: Raw interrupt status.
  fields:
  - name: RXDONE
    description: 'Receive Done Interrupt: Set after a byte is received.'
    bit_offset: 0
    bit_size: 1
    enum: CPU_INT_RIS_RXDONE
  - name: TXDONE
    description: 'Transmission Done Interrupt: Set after a byte is transmitted.'
    bit_offset: 1
    bit_size: 1
    enum: CPU_INT_RIS_TXDONE
  - name: RXTRG
    description: Receive Trigger.  When FIFO is present, triggered as per IFLS settings   when FIFO is not present, this indicates when buffer is full.
    bit_offset: 2
    bit_size: 1
    enum: CPU_INT_RIS_RXTRG
  - name: TXTRG
    description: Transmit Trigger When FIFO is present, triggered as per IFLS settings. When FIFO is not present, trigger when transmit buffer is empty.
    bit_offset: 3
    bit_size: 1
    enum: CPU_INT_RIS_TXTRG
  - name: RXFULL
    description: RXFIFO full event. This interrupt is set if an RX FIFO is full.
    bit_offset: 4
    bit_size: 1
    enum: CPU_INT_RIS_RXFULL
  - name: TXEMPTY
    description: Transmit FIFO Empty Interrupt. This interrupt is set if all data in the Transmit FIFO have been shifted out and FSM goes into idle mode.
    bit_offset: 5
    bit_size: 1
    enum: CPU_INT_RIS_TXEMPTY
  - name: TX_UNFL
    description: Transmit FIFO underflow.
    bit_offset: 6
    bit_size: 1
    enum: CPU_INT_RIS_TX_UNFL
  - name: RX_OVFL
    description: Receive FIFO overflow.
    bit_offset: 7
    bit_size: 1
    enum: CPU_INT_RIS_RX_OVFL
  - name: GENCALL
    description: 'General Call Interrupt: set when a general call is received.'
    bit_offset: 8
    bit_size: 1
    enum: CPU_INT_RIS_GENCALL
  - name: START
    description: 'Start Condition Interrupt: is set after a START condition is received and this target is addressed.'
    bit_offset: 9
    bit_size: 1
    enum: CPU_INT_RIS_START
  - name: STOP
    description: 'Stop Condition Interrupt: set on a STOP condition if this target was being addressed.'
    bit_offset: 10
    bit_size: 1
    enum: CPU_INT_RIS_STOP
  - name: PEC_RX_ERR
    description: RX Pec Error Interrupt.
    bit_offset: 11
    bit_size: 1
    enum: CPU_INT_RIS_PEC_RX_ERR
  - name: TIMEOUTA
    description: Timeout A Interrupt.
    bit_offset: 12
    bit_size: 1
    enum: CPU_INT_RIS_TIMEOUTA
  - name: TIMEOUTB
    description: Timeout B Interrupt.
    bit_offset: 13
    bit_size: 1
    enum: CPU_INT_RIS_TIMEOUTB
  - name: DMA_DONE_RX
    description: DMA Done on Event Channel RX.
    bit_offset: 15
    bit_size: 1
    enum: CPU_INT_RIS_DMA_DONE_RX
  - name: DMA_DONE_TX
    description: DMA Done on Event Channel TX.
    bit_offset: 16
    bit_size: 1
    enum: CPU_INT_RIS_DMA_DONE_TX
  - name: ARBLOST
    description: Arbitration Lost Interrupt.
    bit_offset: 17
    bit_size: 1
    enum: CPU_INT_RIS_ARBLOST
fieldset/CTR:
  description: I2C Target Control Register.
  fields:
  - name: ENABLE
    description: Setting this bit enables the module.
    bit_offset: 0
    bit_size: 1
  - name: GENCALL
    description: General call response enable Modify only when UCSWRST = 1. 0b = Do not respond to a general call 1b = Respond to a general call.
    bit_offset: 1
    bit_size: 1
  - name: TXEMPTY_ON_TREQ
    description: Tx Empty Interrupt on TREQ.
    bit_offset: 3
    bit_size: 1
  - name: TXTRIG_TXMODE
    description: Tx Trigger when Target FSM is in Tx Mode.
    bit_offset: 4
    bit_size: 1
  - name: TXWAIT_STALE_TXFIFO
    description: 'Tx transfer waits when stale data in Tx FIFO. This prevents stale bytes left in the TX FIFO from automatically being sent on the next I2C packet. Note: this should be used with TXEMPTY_ON_TREQ set to prevent the Target State Machine from waiting for TX FIFO data without an interrupt notification when the FIFO data is stale.'
    bit_offset: 5
    bit_size: 1
  - name: RXFULL_ON_RREQ
    description: Rx full interrupt generated on RREQ condition as indicated in SSR.
    bit_offset: 6
    bit_size: 1
  - name: EN_DEFHOSTADR
    description: Enable Default Host Address.
    bit_offset: 7
    bit_size: 1
  - name: EN_ALRESPADR
    description: Enable Alert Response Address.
    bit_offset: 8
    bit_size: 1
  - name: EN_DEFDEVADR
    description: Enable Default device address.
    bit_offset: 9
    bit_size: 1
  - name: SUSPEND
    description: Suspend external communication.
    bit_offset: 11
    bit_size: 1
  - name: CLKSTRETCH
    description: Clock Stretch Enable.
    bit_offset: 20
    bit_size: 1
  - name: WUEN
    description: Target Wakeup Enable.
    bit_offset: 21
    bit_size: 1
