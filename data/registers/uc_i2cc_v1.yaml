fieldset/CPU_INT_RIS:
  description: Raw interrupt status.
  fields:
  - name: RXDONE
    description: 'Receive Done Interrupt: RXDONE interrupt is raised when a burst length completes Or, in case of quick command, when a quick command with R/Wn bit set to ''1''.'
    bit_offset: 0
    bit_size: 1
    enum: CPU_INT_RIS_RXDONE
  - name: TXDONE
    description: 'Transmit Done Interrupt: TXDONE interrupt is raised when a burst length completes Or, in case of quick command, when a quick command with R/Wn bit set to ''0''.'
    bit_offset: 1
    bit_size: 1
    enum: CPU_INT_RIS_TXDONE
  - name: RXTRG
    description: Receive Trigger.  When FIFO is present, as per IFLS settings   when FIFO is not present, this indicates when buffer is full.
    bit_offset: 2
    bit_size: 1
    enum: CPU_INT_RIS_RXTRG
  - name: TXTRG
    description: Transmit Trigger When FIFO is present, as per IFLS settings When FIFO is not present, trigger when transmit buffer is empty.
    bit_offset: 3
    bit_size: 1
    enum: CPU_INT_RIS_TXTRG
  - name: RXFULL
    description: RXFIFO full event. This interrupt is set when receive FIFO is full.
    bit_offset: 4
    bit_size: 1
    enum: CPU_INT_RIS_RXFULL
  - name: TXEMPTY
    description: 'Transmit FIFO Empty: set when Transmit FIFO is empty.'
    bit_offset: 5
    bit_size: 1
    enum: CPU_INT_RIS_TXEMPTY
  - name: NACK
    description: 'Address/Data NACK Interrupt: set when address or data nack is received.'
    bit_offset: 7
    bit_size: 1
    enum: CPU_INT_RIS_NACK
  - name: START
    description: START Detection Interrupt.
    bit_offset: 8
    bit_size: 1
    enum: CPU_INT_RIS_START
  - name: STOP
    description: STOP Detection Interrupt.
    bit_offset: 9
    bit_size: 1
    enum: CPU_INT_RIS_STOP
  - name: ARBLOST
    description: 'Arbitration Lost Interrupt: in multi-controller systems, when this controller loses out during arbitration.'
    bit_offset: 10
    bit_size: 1
    enum: CPU_INT_RIS_ARBLOST
  - name: PEC_RX_ERR
    description: 'Receive PEC Error Interrupt: set when the calculated PEC does not match received PEC.'
    bit_offset: 11
    bit_size: 1
    enum: CPU_INT_RIS_PEC_RX_ERR
  - name: TIMEOUTA
    description: Timeout A Interrupt.
    bit_offset: 12
    bit_size: 1
    enum: CPU_INT_RIS_TIMEOUTA
  - name: TIMEOUTB
    description: Timeout B Interrupt.
    bit_offset: 13
    bit_size: 1
    enum: CPU_INT_RIS_TIMEOUTB
  - name: DMA_DONE_RX
    description: DMA Done on Event Channel RX.
    bit_offset: 15
    bit_size: 1
    enum: CPU_INT_RIS_DMA_DONE_RX
  - name: DMA_DONE_TX
    description: DMA Done on Event Channel TX.
    bit_offset: 16
    bit_size: 1
    enum: CPU_INT_RIS_DMA_DONE_TX
