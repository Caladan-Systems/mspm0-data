fieldset/CPU_INT_RIS:
  description: Raw interrupt status.
  fields:
  - name: RTOUT
    description: UARTOUT Receive Time-Out Interrupt. Interupt is raised when a time-out has lapsed and there are still items in the FIFO.
    bit_offset: 0
    bit_size: 1
    enum: CPU_INT_RIS_RTOUT
  - name: FRMERR
    description: UART Framing Error Interrupt. Framing error interrupt is raised when a &quot;low&quot; stop bit is detected.
    bit_offset: 1
    bit_size: 1
    enum: CPU_INT_RIS_FRMERR
  - name: PARERR
    description: UART Parity Error Interrupt.
    bit_offset: 2
    bit_size: 1
    enum: CPU_INT_RIS_PARERR
  - name: BRKERR
    description: UART Break Error Interrupt. Break Error Interrupt is raised when all data bits, parity bit and stop bits are '0'.
    bit_offset: 3
    bit_size: 1
    enum: CPU_INT_RIS_BRKERR
  - name: OVRERR
    description: UART Receive Overrun Error Interrupt. UART Receive Overrun Error Interrupt is raised when the receive FIFO is flow and a new frame is received.
    bit_offset: 4
    bit_size: 1
    enum: CPU_INT_RIS_OVRERR
  - name: RXNE
    description: Negative Edge on UARTxRXD Interrupt.
    bit_offset: 5
    bit_size: 1
    enum: CPU_INT_RIS_RXNE
  - name: RXPE
    description: Positive Edge on UARTxRXD Interrupt.
    bit_offset: 6
    bit_size: 1
    enum: CPU_INT_RIS_RXPE
  - name: LINC0
    description: LIN Capture 0 / Match Interrupt.
    bit_offset: 7
    bit_size: 1
    enum: CPU_INT_RIS_LINC0
  - name: LINC1
    description: LIN Capture 1 Interrupt.
    bit_offset: 8
    bit_size: 1
    enum: CPU_INT_RIS_LINC1
  - name: LINOVF
    description: LIN Hardware Counter Overflow Interrupt.
    bit_offset: 9
    bit_size: 1
    enum: CPU_INT_RIS_LINOVF
  - name: RXINT
    description: UART Receive Interrupt.
    bit_offset: 10
    bit_size: 1
    enum: CPU_INT_RIS_RXINT
  - name: TXINT
    description: UART Transmit Interrupt.
    bit_offset: 11
    bit_size: 1
    enum: CPU_INT_RIS_TXINT
  - name: EOT
    description: UART End of Transmission Interrupt Indicates that the last bit of all transmitted data and flags has left the serializer and without any further Data in the TX Fifo or Buffer.
    bit_offset: 12
    bit_size: 1
    enum: CPU_INT_RIS_EOT
  - name: ADDR_MATCH
    description: Address Match Interrupt.
    bit_offset: 13
    bit_size: 1
    enum: CPU_INT_RIS_ADDR_MATCH
  - name: CTS
    description: UART Clear to Send Modem Interrupt. This interrupt is raised when CTS toggles, either from '0' to '1' or from '1' to '0'.
    bit_offset: 14
    bit_size: 1
    enum: CPU_INT_RIS_CTS
  - name: DMA_DONE_RX
    description: DMA Done on RX Event Channel Interrupt.
    bit_offset: 15
    bit_size: 1
    enum: CPU_INT_RIS_DMA_DONE_RX
  - name: DMA_DONE_TX
    description: DMA Done on TX Event Channel Interrupt.
    bit_offset: 16
    bit_size: 1
    enum: CPU_INT_RIS_DMA_DONE_TX
  - name: NERR
    description: Noise Error on triple voting. Asserted when the 3 samples of majority voting are not equal.
    bit_offset: 17
    bit_size: 1
    enum: CPU_INT_RIS_NERR
  - name: LTOUT
    description: 'UARTOUT Line Time-Out Interrupt. Set: no start edge has been detected for an additional character period after reception of last character. This is irrespective of FIFO contents Clear: timeout has not occured.'
    bit_offset: 20
    bit_size: 1
    enum: CPU_INT_RIS_LTOUT
fieldset/CTL0:
  description: UART Control Register 0.
  fields:
  - name: ENABLE
    description: UART Module Enable. If the UART is disabled in the middle of transmission or reception, it completes the current character before stopping. If the ENABLE bit is not set, all registers can still be accessed and updated. It is recommended to setup and change the UART operation mode with having the ENABLE bit cleared to avoid unpredictable behavior during the setup or update. If disabled the UART module will not send or receive any data and the logic is held in reset state.
    bit_offset: 0
    bit_size: 1
  - name: LBE
    description: UART Loop Back Enable.
    bit_offset: 2
    bit_size: 1
  - name: RXE
    description: 'UART Receive Enable If the UART is disabled in the middle of a receive, it completes the current character before stopping. #b#NOTE:#/b# To enable reception, the UARTEN bit must be set.'
    bit_offset: 3
    bit_size: 1
  - name: TXE
    description: 'UART Transmit Enable If the UART is disabled in the middle of a transmission, it completes the current character before stopping. #b#NOTE:#/b# To enable transmission, the UARTEN bit must be set.'
    bit_offset: 4
    bit_size: 1
  - name: TXD_OUT_EN
    description: TXD Pin Control Enable. When the transmit section of the UART is disabled (TXE = 0), the TXD pin can be controlled by the TXD_OUT bit.
    bit_offset: 5
    bit_size: 1
  - name: TXD_OUT
    description: TXD Pin Control Controls the TXD pin when TXD_OUT_EN = 1 and TXE = 0.
    bit_offset: 6
    bit_size: 1
    enum: TXD_OUT
  - name: MENC
    description: Manchester Encode enable.
    bit_offset: 7
    bit_size: 1
  - name: MODE
    description: 'Set the communication mode and protocol used. (Not defined settings uses the default setting: 0).'
    bit_offset: 8
    bit_size: 3
    enum: MODE
  - name: RTS
    description: Request to Send If RTSEN is set the RTS output signals is controlled by the hardware logic using the FIFO fill level or buffer status. If RTSEN is cleared the RTS output is controlled by the RTS bit. The bit is the complement of the UART request to send, RTS modem status output.
    bit_offset: 12
    bit_size: 1
    enum: RTS
  - name: RTSEN
    description: Enable hardware controlled Request to Send.
    bit_offset: 13
    bit_size: 1
  - name: CTSEN
    description: Enable Clear To Send.
    bit_offset: 14
    bit_size: 1
  - name: HSE
    description: 'High-Speed Bit Oversampling Enable #b#NOTE:#/b# The bit oversampling influences the UART baud-rate configuration. The state of this bit has no effect on clock generation in ISO7816 smart card mode (the SMART bit is set).'
    bit_offset: 15
    bit_size: 2
    enum: HSE
  - name: MAJVOTE
    description: 'Majority Vote Enable When Majority Voting is enabled, the three center bits are used to determine received sample value. In case of error (i.e. all 3 bits are not the same), noise error is detected and bits RIS.NERR and register RXDATA.NERR are set. Oversampling of 16 : bits 7, 8, 9 are used Oversampling of 8 : bits 3, 4, 5 are used Disabled : Single sample value (center value) used.'
    bit_offset: 18
    bit_size: 1
  - name: MSBFIRST
    description: 'Most Significant Bit First This bit has effect both on the way protocol byte is transmitted and received. Notes: User needs to match the protocol to the correct value of this bit to send MSb or LSb first. The hardware engine will send the byte entirely based on this bit.'
    bit_offset: 19
    bit_size: 1
